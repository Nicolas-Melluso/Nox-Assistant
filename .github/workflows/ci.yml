name: CI - Docker, Tests y Cobertura

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image (no cache)
        run: docker build --no-cache -t custom-voice-assistant .

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Run tests in Docker
        run: docker run --rm -e TESTS=1 custom-voice-assistant

  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Run coverage in Docker
        run: |
          docker run --rm -e TESTS=1 custom-voice-assistant sh -c "pip install coverage && coverage run -m pytest tests/unit && coverage report --fail-under=80"

  cobertura-minima:
    runs-on: ubuntu-latest
    needs: coverage
    if: ${{ failure() }}
    steps:
      - name: Falla si cobertura <80%
        run: |
          echo "La cobertura de código es menor al 80%. Corrige los tests antes de mergear."
          exit 1